<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>MT JOIAS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#fff;
}

/* HEADER */
header{
  background:#1a1a1a;
  color:#fff;
  text-align:center;
  padding:25px;
}

/* CONTAINER */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:50px;
  padding:50px;
}

/* IMG */
.container img{
  width:300px;
  border-radius:10px;
}

/* INFO */
.info{
  max-width:450px;
}

/* PREÇO */
.preco{
  font-size:20px;
  margin-top:15px;
}

.preco del{
  color:gray;
}

.preco span{
  color:green;
  font-weight:bold;
  margin-left:10px;
}

/* BOTÕES */
button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.box{
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:320px;
}

/* MENU */
aside{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100vh;
  background:#1a1a1a;
  color:#fff;
  padding:20px;
  transition:0.3s;
  overflow-y:auto;
  z-index:10000;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    flex-direction:column;
    text-align:center;
    padding:20px;
  }

  .container img{
    width:85%;
  }

  .info{
    width:100%;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>MT Joias</h1>
  <h2>Brinco Raio</h2>
</header>

<!-- BOTÃO MENU (CORRIGIDO CANTO ESQUERDO) -->
<button onclick="toggleMenu()" style="
position:fixed;
top:10px;
left:10px;
z-index:10000;
background:#1a1a1a;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
">
☰
</button>

<!-- MENU -->
<aside id="menuLateral">

  <h2 style="border-bottom:1px solid #444;padding-bottom:10px;">
    Categorias
  </h2>

  <ul style="list-style:none;padding:0;margin-top:20px;">

    <li style="margin-bottom:15px;">
      <a href="index.html" style="color:white;text-decoration:none;font-weight:bold;">
        🏠 Início
      </a>
    </li>

    <li style="margin-bottom:15px;">
      <details style="width:100%;">
  <summary style="
    cursor:pointer;
    font-weight:bold;
    display:block;
    padding:8px 0;
    color:white;
    list-style:none;
    user-select:none;
    transition:0.3s;
  "
  onmouseover="this.style.color='#00ff88'"
  onmouseout="this.style.color='white'">
    ▼ Produtos
  </summary>

        <ul style="list-style:none;padding-left:15px;margin-top:10px;">
          <li><a href="produto2.html" style="color:#ccc;text-decoration:none;">Brinco Ponto de Luz</a></li>
          <li><a href="produto1.html" style="color:#ccc;text-decoration:none;">Brinco Argola Neymar</a></li>
          <li><a href="produto4.html" style="color:#ccc;text-decoration:none;">Brinco Raio</a></li>
          <li><a href="produto3.html" style="color:#ccc;text-decoration:none;">Argola Prata 925</a></li>
        </ul>
      </details>
    </li>

  </ul>

  <div style="margin-top:30px;border-top:1px solid #444;padding-top:20px;">
    <a href="https://wa.me/5561992564664"
       target="_blank"
       style="color:#00ff88;text-decoration:none;font-weight:bold;">
       ➔ Suporte WhatsApp
    </a>
  </div>

</aside>

<!-- SCRIPT MENU -->
<script>
function toggleMenu(){
  let menu = document.getElementById("menuLateral");

  if(menu.style.left === "0px"){
    menu.style.left = "-260px";
  } else {
    menu.style.left = "0px";
  }
}
</script>

<!-- PRODUTO -->
<div class="container">

  <img src="https://i.pinimg.com/1200x/8a/17/2a/8a172a7d64fd180efe431aa3febf6577.jpg">

  <div class="info">

    <h2>Brinco Raio</h2>

    <p style="color:gray;margin-top:10px;">
      Brinco/Piercing Raio com pedras zirconia.
    </p>

    <p class="preco">
      <del>R$29,00</del>
      <span>R$19,99</span>
    </p>

    <button onclick="window.location.href='https://wa.me/5561992564664'">
      Comprar no WhatsApp
    </button>

    <!-- BOTÃO COMPRAR AGORA (ADICIONADO) -->
    <button onclick="abrirFrete()">
      🛒 Comprar agora
    </button>

  </div>
</div>

<!-- POPUP FRETE -->
<div id="frete" class="popup">
  <div class="box">

    <h3>Como deseja receber?</h3><br>

    <button onclick="window.location.href='https://pag.ae/81LegDJzt'">
      🛵 Motoboy Premium R$25,00
    </button>

    <button onclick="window.location.href='https://pag.ae/81LefqDTP'">
      📦 Via Correios
    </button>

    <button onclick="window.location.href='https://pag.ae/81LefYyxN'">
      📍 Retirada no local
    </button>

    <button style="background:red;margin-top:10px;" onclick="fecharFrete()">
      Fechar
    </button>

  </div>
</div>

<script>
function abrirFrete(){
  document.getElementById("frete").style.display="flex";
}

function fecharFrete(){
  document.getElementById("frete").style.display="none";
}
</script>

</body>
</html>
