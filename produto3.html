<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>MT JOIAS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#fff;
}

/* HEADER */
header{
  background:#1a1a1a;
  color:#fff;
  text-align:center;
  padding:25px;
}

/* LAYOUT */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:50px;
  padding:50px;
}

/* IMAGEM */
.container img{
  width:300px;
  border-radius:10px;
}

/* INFO */
.info{
  max-width:400px;
}

/* PREÇO */
.preco{
  font-size:20px;
  margin-top:15px;
}

.preco del{
  color:gray;
}

.preco span{
  color:green;
  font-weight:bold;
  margin-left:10px;
}

/* BOTÕES */
button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.box{
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:320px;
}

/* MENU */
aside{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100vh;
  background:#1a1a1a;
  color:#fff;
  padding:20px;
  transition:0.3s;
  overflow-y:auto;
  z-index:1000;
}

.menu-btn{
  position:fixed;
  top:10px;
  left:10px;
  background:#1a1a1a;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  z-index:1001;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    flex-direction:column;
    text-align:center;
    padding:20px;
  }

  .container img{
    width:85%;
  }

  .info{
    width:100%;
  }
}
</style>
</head>

<body>

<header>
  <h1>MT Joias</h1>
  <h2>Brinco Argola Estilo Neymar Prata 925</h2>
</header>

<!-- MENU -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<aside id="menu">
  <h3>Categorias</h3>
  <br>

  <a href="index.html" style="color:#fff;text-decoration:none;">🏠 Início</a>
  <br><br>

  <details>
    <summary>Produtos</summary>
    <br>
    <a href="produto1.html" style="color:#ccc;">Brinco Ponto de Luz</a><br>
    <a href="produto2.html" style="color:#ccc;">Brinco Argola Neymar</a><br>
    <a href="produto3.html" style="color:#ccc;">Brinco Prata 925</a><br>
  </details>

  <br><br>
  <a href="https://wa.me/5561992564664" style="color:#00ff88;">
    Suporte WhatsApp
  </a>
</aside>

<!-- PRODUTO -->
<div class="container">

  <img src="https://i.pinimg.com/1200x/4f/1f/c9/4f1fc909be98f5d521d5f3cb9dd7064c.jpg">

  <div class="info">

    <h2>Brinco Argola Estilo Neymar Prata 925</h2>

    <p style="color:gray; margin-top:10px;">
      Leve, confortável e ideal para o dia a dia.
    </p>

    <p class="preco">
      <del>R$49,99</del>
      <span>R$34,99</span>
    </p>

    <button onclick="window.location.href='https://wa.me/5561992564664?text=Quero%20comprar%20o%20brinco%20Prata%20925'">
      Comprar no WhatsApp
    </button>

    <button onclick="abrirFrete()">
      🛒 Comprar agora
    </button>

  </div>
</div>

<!-- FRETE -->
<div id="frete" class="popup">
  <div class="box">

    <h3>Como deseja receber?</h3><br>

    <button onclick="window.location.href='https://pag.ae/81LdDqATP'">
      🛵 Motoboy R$25
    </button>

    <button onclick="window.location.href='https://pag.ae/81Lck8aS7'">
      📦 Correios
    </button>

    <button onclick="window.location.href='https://pag.ae/81LcniiKs'">
      📍 Retirada grátis
    </button>

    <button style="background:red;margin-top:10px;" onclick="fecharFrete()">
      Fechar
    </button>

  </div>
</div>

<!-- SCRIPT -->
<script>
function abrirFrete(){
  document.getElementById("frete").style.display="flex";
}

function fecharFrete(){
  document.getElementById("frete").style.display="none";
}

function toggleMenu(){
  let menu=document.getElementById("menu");

  if(menu.style.left==="0px"){
    menu.style.left="-260px";
  }else{
    menu.style.left="0px";
  }
}
</script>

</body>
</html>
